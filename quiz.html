<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz de Logística - Múltipla Escolha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f2f2f2; color: #000; }
    section { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; max-width: 600px; margin-left:auto; margin-right:auto; }
    h1, h2 { color: #d00000; }
    button { padding: 5px 10px; margin-top: 5px; }
    .feedback { font-weight: bold; margin-top: 5px; }
    .option { display: block; margin-bottom: 5px; }
  </style>
</head>
<body>

<header>
  <h1>Quiz de Logística</h1>
  <p>Escolha a alternativa correta!</p>
</header>

<main>
  <!-- Quiz será inserido aqui via JS -->
</main>

<script>
  const quiz = [
    {
      pergunta: "O que é logística?",
      alternativas: [
        "Planejar, organizar e controlar produtos e informações",
        "Apenas transportar produtos",
        "Somente armazenar produtos"
      ],
      correta: 0
    },
    {
      pergunta: "Por que logística é importante?",
      alternativas: [
        "Para que produtos cheguem no lugar certo, na hora certa",
        "Para aumentar o preço dos produtos",
        "Para decorar o estoque"
      ],
      correta: 0
    },
    {
      pergunta: "Qual o objetivo principal da logística?",
      alternativas: [
        "Garantir eficiência no transporte e armazenamento",
        "Criar promoções para clientes",
        "Evitar comprar produtos"
      ],
      correta: 0
    }
  ];

  const main = document.querySelector('main');

  quiz.forEach((q, i) => {
    const section = document.createElement('section');
    section.innerHTML = `<h2>Pergunta ${i+1}</h2><p>${q.pergunta}</p>`;
    
    q.alternativas.forEach((alt, index) => {
      const button = document.createElement('button');
      button.textContent = alt;
      button.className = 'option';
      button.addEventListener('click', () => {
        const feedback = section.querySelector('.feedback') || document.createElement('p');
        feedback.className = 'feedback';
        if(index === q.correta) {
          feedback.textContent = "✅ Correto!";
          feedback.style.color = "green";
        } else {
          feedback.textContent = "❌ Errado! Tente novamente.";
          feedback.style.color = "red";
        }
        if(!section.contains(feedback)) section.appendChild(feedback);
      });
      section.appendChild(button);
    });

    main.appendChild(section);
  });
</script>

</body>
</html>
