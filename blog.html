<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Blog da Turma - 1º Ano Logística</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>Blog do 1º Ano de Logística</h1>
  <h3>Etec João Elias Margutti • Santa Cruz das Palmeiras</h3>

  <div id="auth">
    <h2>Login / Criar Conta</h2>
    <input id="nome" placeholder="Nome (só para criar conta)">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="criarConta()">Criar Conta</button>
    <button onclick="login()">Entrar</button>
  </div>

  <div id="areaPost" style="display:none;">
    <h2>Novo Post</h2>
    <input id="titulo" placeholder="Título do post">
    <textarea id="conteudo" placeholder="Conteúdo do post"></textarea>
    <button onclick="criarPost()">Publicar</button>
  </div>

  <div id="posts">
    <h2>Postagens</h2>
    <div id="listaPosts"></div>
  </div>

  <script type="module" src="js/script.js"></script>
</body>
</html>
